<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00072d"/>
      <stop offset="100%" stop-color="#0a2472"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Badge -->
  <rect x="0" y="0" width="50" height="50" rx="10" fill="url(#logoBg)"/>
  <text x="10" y="32" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#5ea173">MJ</text>
  <text x="5" y="44" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.6)" letter-spacing="1">ROBERTS</text>
  
  <!-- Company Name -->
  <text x="62" y="22" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#00072d">MJ</text>
  <text x="88" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#5ea173">&amp;</text>
  <text x="100" y="22" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0a2472">Roberts</text>
  
  <!-- Consulting tagline -->
  <text x="62" y="40" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#5a6e8a" letter-spacing="0.5">Enterprise Technology Consulting</text>
</svg>
